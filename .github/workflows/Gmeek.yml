      - name: Customize Gmeek source
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          gmeek_file = Path("/opt/Gmeek/Gmeek.py")
          template_file = Path("/opt/Gmeek/templates/plist.html")

          gmeek_text = gmeek_file.read_text(encoding="utf-8")
          template_text = template_file.read_text(encoding="utf-8")

          # ============================================================
          # 1. 修改真正控制首页顺序的位置
          #    reverse=True 代表最新文章在前
          #    reverse=False 代表最早文章在前
          # ============================================================
          old_sort = (
              'blog.blogBase["postListJson"]=dict(sorted('
              'blog.blogBase["postListJson"].items(),'
              'key=lambda x:x[1]["createdAt"],reverse=True))'
          )

          new_sort = (
              'blog.blogBase["postListJson"]=dict(sorted('
              'blog.blogBase["postListJson"].items(),'
              'key=lambda x:x[1]["createdAt"],reverse=False))'
          )

          if old_sort in gmeek_text:
              gmeek_text = gmeek_text.replace(
                  old_sort,
                  new_sort,
                  1
              )
          else:
              # 兼容空格或格式发生轻微变化的情况
              gmeek_text, count = re.subn(
                  r'blog\.blogBase\["postListJson"\]\s*=\s*dict\('
                  r'sorted\('
                  r'blog\.blogBase\["postListJson"\]\.items\(\),'
                  r'\s*key\s*=\s*lambda\s+x\s*:\s*x\[1\]\["createdAt"\],'
                  r'\s*reverse\s*=\s*True'
                  r'\)\)',
                  'blog.blogBase["postListJson"]=dict(sorted('
                  'blog.blogBase["postListJson"].items(),'
                  'key=lambda x:x[1]["createdAt"],reverse=False))',
                  gmeek_text,
                  count=1
              )

              if count == 0:
                  raise RuntimeError(
                      "没有找到 postListJson 的 reverse=True 排序代码。"
                  )

          # ============================================================
          # 2. 在首页生成之前，对内存中的文章字典进行升序排序
          #    这一段非常重要，否则只修改文件末尾排序可能来不及影响首页
          # ============================================================
          old_create = "self.createPlistHtml()"

          new_create = (
              'self.blogBase["postListJson"] = dict(sorted('
              'self.blogBase["postListJson"].items(), '
              'key=lambda x: x[1]["createdAt"], '
              'reverse=False'
              '))\n'
              '            self.createPlistHtml()'
          )

          replacement_count = 0

          # 只替换 runAll 中第一次出现的位置
          if old_create in gmeek_text:
              gmeek_text = gmeek_text.replace(
                  old_create,
                  new_create,
                  1
              )
              replacement_count = 1

          if replacement_count == 0:
              raise RuntimeError(
                  "没有找到首页生成调用 self.createPlistHtml()。"
              )

          gmeek_file.write_text(
              gmeek_text,
              encoding="utf-8"
          )

          # ============================================================
          # 3. 删除整个日期标签 span，而不是只删除日期文字
          # ============================================================
          date_patterns = [
              # 单引号写法
              r'<span[^>]*class="[^"]*Label[^"]*"[^>]*'
              r'style="[^"]*dateLabelColor[^"]*"[^>]*>'
              r'\s*\{\{\s*postListJson\[num\]\[\'createdDate\'\]\s*\}\}'
              r'\s*</span>',

              # 双引号写法
              r'<span[^>]*class="[^"]*Label[^"]*"[^>]*'
              r'style="[^"]*dateLabelColor[^"]*"[^>]*>'
              r'\s*\{\{\s*postListJson\[num\]\["createdDate"\]\s*\}\}'
              r'\s*</span>'
          ]

          removed = 0

          for pattern in date_patterns:
              template_text, count = re.subn(
                  pattern,
                  "",
                  template_text,
                  count=1,
                  flags=re.DOTALL
              )
              removed += count

          # 如果上面的精确匹配未命中，使用包含 createdDate 的 span 通用匹配
          if removed == 0:
              template_text, count = re.subn(
                  r'<span\b[^>]*>[^<]*'
                  r'\{\{\s*postListJson\[num\]\[[\'"]createdDate[\'"]\]\s*\}\}'
                  r'[^<]*</span>',
                  "",
                  template_text,
                  count=1,
                  flags=re.DOTALL
              )
              removed += count

          if removed == 0:
              raise RuntimeError(
                  "没有找到日期标签的完整 span，停止构建。"
              )

          # ============================================================
          # 4. RSS 图标改为跳转首页
          # ============================================================
          template_text = template_text.replace(
              "{{ blogBase['homeUrl'] }}/rss.xml",
              "https://giffgaff.wufeng.de/"
          )

          template_text = template_text.replace(
              '{{ blogBase["homeUrl"] }}/rss.xml',
              "https://giffgaff.wufeng.de/"
          )

          template_file.write_text(
              template_text,
              encoding="utf-8"
          )

          print("SORT_PATCH_SUCCESS")
          print("DATE_LABEL_REMOVED")
          print("RSS_LINK_PATCHED")
          PY
