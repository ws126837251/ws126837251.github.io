name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"

jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04

    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event.repository.owner.id == github.event.sender.id
      }}

    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

          echo "====== config.json ======"
          cat config.json
          echo "====== config.json end ======"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Clone Gmeek source
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)

          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek
          cd /opt/Gmeek

          if [ "$GMEEK_VERSION" = "last" ]; then
            LAST_TAG=$(git describe --tags "$(git rev-list --tags --max-count=1)")
            git checkout "$LAST_TAG"
          else
            git checkout "$GMEEK_VERSION"
          fi

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt
          pip install beautifulsoup4

      - name: Generate HTML
        run: |
          cp -r "${{ github.workspace }}/." /opt/Gmeek/

          cd /opt/Gmeek

          python Gmeek.py \
            "${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.repository }}" \
            --issue_number '${{ github.event.issue.number }}'

      - name: Customize generated homepage
        run: |
          python <<'PY'
          import re
          from collections import defaultdict
          from pathlib import Path

          from bs4 import BeautifulSoup


          DOCS_DIR = Path("/opt/Gmeek/docs")
          HOME_URL = "https://giffgaff.wufeng.de/"
          DATE_RE = re.compile(r"^\d{4}-\d{2}-\d{2}$")


          def find_date_label(text_node, row):
              """
              找到日期所在的完整标签，例如：
              <span class="Label">2026-07-10</span>

              删除整个 span，避免只清空文字后留下绿色色块。
              """
              tag = text_node.parent
              candidates = []

              while tag is not None and tag != row:
                  if DATE_RE.fullmatch(tag.get_text(strip=True)):
                      candidates.append(tag)
                  tag = tag.parent

              if not candidates:
                  return text_node.parent

              # 选择最外层、但文本仍然只有日期的元素
              return candidates[-1]


          def find_article_row(text_node):
              """
              Gmeek 的文章行通常是一个完整的 a 标签。
              优先找到包含日期的最近一层链接。
              """
              row = text_node.find_parent("a")
              if row is not None:
                  return row

              # 兼容其他版本的 Gmeek
              row = text_node.find_parent(
                  class_=lambda value: value and "Box-row" in str(value)
              )
              return row


          def process_homepage(html_file):
              html = html_file.read_text(encoding="utf-8")
              soup = BeautifulSoup(html, "html.parser")

              changed = False

              # ---------------------------------------------------------
              # 1. 修改 RSS 图标链接
              # ---------------------------------------------------------
              for link in soup.find_all("a", href=True):
                  href = link.get("href", "").strip().lower()
                  title = link.get("title", "").strip().lower()
                  aria = link.get("aria-label", "").strip().lower()

                  svg_text = str(link).lower()

                  is_rss = (
                      "rss.xml" in href
                      or href.endswith("/rss")
                      or href.endswith("/rss/")
                      or title == "rss"
                      or aria == "rss"
                      or "octicon-rss" in svg_text
                      or 'href="#rss"' in svg_text
                      or 'href="#octicon-rss"' in svg_text
                  )

                  if is_rss:
                      link["href"] = HOME_URL
                      changed = True

              # ---------------------------------------------------------
              # 2. 查找每篇文章及其日期
              # ---------------------------------------------------------
              articles = []

              date_text_nodes = soup.find_all(
                  string=lambda text: (
                      text is not None and
                      DATE_RE.fullmatch(text.strip()) is not None
                  )
              )

              for text_node in date_text_nodes:
                  date_value = text_node.strip()
                  row = find_article_row(text_node)

                  if row is None:
                      continue

                  date_label = find_date_label(text_node, row)

                  articles.append({
                      "date": date_value,
                      "row": row,
                      "date_label": date_label
                  })

              if not articles:
                  raise RuntimeError(
                      f"没有在 {html_file} 中找到文章日期，"
                      "为防止发布错误页面，本次构建已停止。"
                  )

              # 去除重复的文章行
              unique_articles = []
              seen_rows = set()

              for article in articles:
                  row_identity = id(article["row"])

                  if row_identity not in seen_rows:
                      seen_rows.add(row_identity)
                      unique_articles.append(article)

              articles = unique_articles

              print(f"找到文章数量：{len(articles)}")

              # ---------------------------------------------------------
              # 3. 删除整个日期标签，避免残留绿色色块
              # ---------------------------------------------------------
              for article in articles:
                  article["date_label"].decompose()

              changed = True

              # ---------------------------------------------------------
              # 4. 按日期从早到晚排序
              # ---------------------------------------------------------
              groups = defaultdict(list)

              for original_index, article in enumerate(articles):
                  parent = article["row"].parent

                  groups[id(parent)].append({
                      **article,
                      "parent": parent,
                      "original_index": original_index
                  })

              for group in groups.values():
                  parent = group[0]["parent"]

                  # 同一天的文章保持原来的相对顺序
                  group.sort(
                      key=lambda item: (
                          item["date"],
                          item["original_index"]
                      )
                  )

                  # 记录第一个文章行原来的位置
                  first_row = min(
                      group,
                      key=lambda item: item["original_index"]
                  )["row"]

                  marker = soup.new_tag("span")
                  marker["data-gmeek-sort-marker"] = "true"
                  first_row.insert_before(marker)

                  # 先从页面中取出所有文章
                  for item in group:
                      item["row"].extract()

                  # 再按日期从早到晚放回原位置
                  for item in group:
                      marker.insert_before(item["row"])

                  marker.decompose()

              # ---------------------------------------------------------
              # 5. 保存
              # ---------------------------------------------------------
              if changed:
                  html_file.write_text(
                      str(soup),
                      encoding="utf-8"
                  )

              print(f"已处理：{html_file}")


          homepage = DOCS_DIR / "index.html"

          if not homepage.exists():
              raise FileNotFoundError(
                  "/opt/Gmeek/docs/index.html 不存在，无法继续部署。"
              )

          process_homepage(homepage)

          print("CUSTOMIZE_SUCCESS")
          PY

      - name: Verify customized homepage
        run: |
          python <<'PY'
          import re
          from pathlib import Path

          from bs4 import BeautifulSoup


          index_file = Path("/opt/Gmeek/docs/index.html")
          html = index_file.read_text(encoding="utf-8")
          soup = BeautifulSoup(html, "html.parser")

          date_pattern = re.compile(r"^\d{4}-\d{2}-\d{2}$")

          remaining_dates = [
              text.strip()
              for text in soup.find_all(string=True)
              if date_pattern.fullmatch(text.strip())
          ]

          if remaining_dates:
              raise RuntimeError(
                  "首页仍然存在日期标签：" + ", ".join(remaining_dates[:10])
              )

          rss_links = []

          for link in soup.find_all("a", href=True):
              if "rss" in str(link).lower():
                  rss_links.append(link.get("href"))

          print("首页日期标签已全部删除")
          print("CUSTOMIZE_VERIFIED")
          PY

      - name: Copy generated files
        run: |
          rm -rf "${{ github.workspace }}/docs"
          rm -rf "${{ github.workspace }}/backup"

          cp -a /opt/Gmeek/docs "${{ github.workspace }}/"
          cp -a /opt/Gmeek/backup "${{ github.workspace }}/"
          cp /opt/Gmeek/blogBase.json "${{ github.workspace }}/"

      - name: Commit generated files
        run: |
          cd "${{ github.workspace }}"

          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"

          git add docs backup blogBase.json

          git commit \
            -m "🎉 auto update by customized Gmeek action" \
            || echo "nothing to commit"

          git push || echo "nothing to push"

          sleep 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/."

  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      contents: write
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
