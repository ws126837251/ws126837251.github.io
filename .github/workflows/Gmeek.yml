name: build Gmeek

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  schedule:
    - cron: "0 16 * * *"

jobs:
  build:
    name: Generate blog
    runs-on: ubuntu-24.04

    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'schedule' ||
        github.event.repository.owner.id == github.event.sender.id
      }}

    permissions: write-all

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Get config.json
        run: |
          echo "====== check config.json file ======"
          cat config.json
          echo "====== check config.json end ======"
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Clone source code
        run: |
          GMEEK_VERSION=$(jq -r ".GMEEK_VERSION" config.json)

          git clone https://github.com/Meekdai/Gmeek.git /opt/Gmeek
          cd /opt/Gmeek

          lastTag=$(git describe --tags "$(git rev-list --tags --max-count=1)")

          if [ "$GMEEK_VERSION" = "last" ]; then
            git checkout "$lastTag"
          else
            git checkout "$GMEEK_VERSION"
          fi

      - name: Customize Gmeek source
        run: |
          python <<'PY'
          from pathlib import Path

          gmeek_file = Path("/opt/Gmeek/Gmeek.py")
          template_file = Path("/opt/Gmeek/templates/plist.html")

          # ------------------------------------------------------------
          # 1. 文章按照创建时间从早到晚读取
          # ------------------------------------------------------------
          gmeek_text = gmeek_file.read_text(encoding="utf-8")

          old_issue_code = "issues=self.repo.get_issues()"
          new_issue_code = (
              "issues=sorted("
              "self.repo.get_issues(state='open'), "
              "key=lambda issue: issue.created_at"
              ")"
          )

          if old_issue_code not in gmeek_text:
              raise RuntimeError(
                  "没有找到 issues=self.repo.get_issues()，"
                  "Gmeek 源码可能已更新，请停止构建。"
              )

          gmeek_text = gmeek_text.replace(
              old_issue_code,
              new_issue_code,
              1
          )

          gmeek_file.write_text(
              gmeek_text,
              encoding="utf-8"
          )

          # ------------------------------------------------------------
          # 2. 首页删除日期标签
          # 3. RSS 图标跳转到网站首页
          # ------------------------------------------------------------
          template_text = template_file.read_text(encoding="utf-8")

          date_code = "{{ postListJson[num]['createdDate'] }}"

          if date_code not in template_text:
              raise RuntimeError(
                  "没有找到首页日期模板 createdDate，"
                  "Gmeek 模板可能已更新，请停止构建。"
              )

          template_text = template_text.replace(
              date_code,
              "",
              1
          )

          # RSS 原链接通常为 homeUrl/rss.xml
          template_text = template_text.replace(
              "{{ blogBase['homeUrl'] }}/rss.xml",
              "{{ blogBase['homeUrl'] }}/"
          )

          template_text = template_text.replace(
              '{{ blogBase["homeUrl"] }}/rss.xml',
              '{{ blogBase["homeUrl"] }}/'
          )

          template_file.write_text(
              template_text,
              encoding="utf-8"
          )

          print("Gmeek source customization completed.")
          PY

      - name: Verify customization
        run: |
          echo "====== verify article sorting ======"
          grep -n "issues=sorted" /opt/Gmeek/Gmeek.py

          echo "====== verify date removed ======"
          if grep -q "postListJson\[num\]\['createdDate'\]" \
            /opt/Gmeek/templates/plist.html; then
            echo "ERROR: 日期模板仍然存在"
            exit 1
          else
            echo "日期模板已成功删除"
          fi

          echo "====== verify RSS link ======"
          grep -n "rss" /opt/Gmeek/templates/plist.html || true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r /opt/Gmeek/requirements.txt

      - name: Generate new html
        run: |
          cp -r ./* /opt/Gmeek/
          cd /opt/Gmeek

          python Gmeek.py \
            "${{ secrets.GITHUB_TOKEN }}" \
            "${{ github.repository }}" \
            --issue_number '${{ github.event.issue.number }}'

          cp -a /opt/Gmeek/docs "${{ github.workspace }}"
          cp -a /opt/Gmeek/backup "${{ github.workspace }}"
          cp /opt/Gmeek/blogBase.json "${{ github.workspace }}"

      - name: Verify generated homepage
        run: |
          echo "====== check generated dates ======"

          if grep -Eo "20[0-9]{2}-[0-9]{2}-[0-9]{2}" \
            docs/index.html | head; then
            echo "提示：页面中可能还有其他日期文本，请检查上方输出。"
          fi

          echo "====== first article titles ======"
          grep -o 'class="Link--primary[^>]*>[^<]*' \
            docs/index.html | head -20 || true

      - name: Update html
        run: |
          git config --local user.email "$(jq -r ".email" config.json)"
          git config --local user.name "${{ github.repository_owner }}"

          git add .
          git commit -m "🎉 auto update by Gmeek action" \
            || echo "nothing to commit"

          git push || echo "nothing to push"
          sleep 3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs/."

  deploy:
    name: Deploy blog
    runs-on: ubuntu-24.04
    needs: build

    permissions:
      contents: write
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: false

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
